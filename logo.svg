<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#05080d"/>
      <stop offset="100%" style="stop-color:#0d1520"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4ff"/>
      <stop offset="100%" style="stop-color:#0057ff"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="400" height="400" rx="48" fill="url(#bgGrad)"/>

  <!-- Outer border ring -->
  <rect x="6" y="6" width="388" height="388" rx="44" fill="none" stroke="#00d2ff" stroke-width="1.5" opacity="0.25"/>

  <!-- Speedometer arc (top half) -->
  <path d="M 82 230 A 118 118 0 0 1 318 230" fill="none" stroke="#1a2535" stroke-width="18" stroke-linecap="round"/>
  <path d="M 82 230 A 118 118 0 0 1 318 230" fill="none" stroke="url(#accentGrad)" stroke-width="5" stroke-linecap="round" filter="url(#glow)" opacity="0.9"/>

  <!-- Tick marks on arc -->
  <g stroke="#00d2ff" stroke-width="2" opacity="0.5">
    <!-- left tick -->
    <line x1="86" y1="218" x2="94" y2="228"/>
    <!-- left-mid tick -->
    <line x1="120" y1="148" x2="130" y2="155"/>
    <!-- top tick -->
    <line x1="200" y1="114" x2="200" y2="126"/>
    <!-- right-mid tick -->
    <line x1="280" y1="148" x2="270" y2="155"/>
    <!-- right tick -->
    <line x1="314" y1="218" x2="306" y2="228"/>
  </g>

  <!-- Needle -->
  <line x1="200" y1="230" x2="278" y2="160" stroke="url(#accentGrad)" stroke-width="3.5" stroke-linecap="round" filter="url(#glow)"/>

  <!-- Needle center dot -->
  <circle cx="200" cy="230" r="10" fill="#0d1520" stroke="#00d2ff" stroke-width="2.5"/>
  <circle cx="200" cy="230" r="4" fill="#00d2ff"/>

  <!-- "PVS" text -->
  <text x="200" y="295" font-family="'JetBrains Mono', 'Courier New', monospace" font-weight="700" font-size="52" fill="url(#accentGrad)" text-anchor="middle" letter-spacing="6" filter="url(#glow)">PVS</text>

  <!-- Subtitle -->
  <text x="200" y="335" font-family="'Inter', 'Arial', sans-serif" font-weight="400" font-size="13" fill="#6b7f96" text-anchor="middle" letter-spacing="3">PROXIMA · VEHICLE · SPECS</text>

  <!-- Bottom decorative line -->
  <line x1="130" y1="352" x2="270" y2="352" stroke="#00d2ff" stroke-width="1" opacity="0.3"/>
</svg>
